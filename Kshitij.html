<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza House</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    /*background-image: url('https://www.godubrovnik.com/wp-content/uploads/pizza.jpg');*/
    background-size: cover;
    margin: 0;
    padding: 0;
    position: relative; /* Ensure proper positioning of pseudo-element */
}

/* Add blur effect to the background image */
body::before {
    content: "";
    background: url('https://www.godubrovnik.com/wp-content/uploads/pizza.jpg');
    position: fixed;
    background-size: cover;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1; 
    filter: blur(5px); 
}


.container {
    max-width: 800px;
    margin: 60px auto;
    padding: 20px;
    background-color: rgba(255, 255, 255, 0.5); /* Setting opacity to 50% */
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(251, 249, 249, 0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
}


            h1 {
                text-align: center;
                color: #ff2600;
                margin-bottom: 30px;
            }

            form {
                text-align: center;
                margin-bottom: 20px;
            }

            label {
                font-size: 18px;
                display: block;
            }

            input[type="text"],
            input[type="password"],
            select {
                padding: 10px;
                width: calc(100% - 22px);
                margin: 10px 0;
                font-size: 16px;
                box-sizing: border-box;
            }

            input[type="button"] {
                padding: 10px 20px;
                background-color: #ff6347;
                color: #fff;
                border: none;
                font-size: 18px;
                cursor: pointer;
                margin-top: 10px;
            }

            input[type="button"]:hover {
                background-color: #ff4500;
            }

            #order-display {
                margin-top: 20px;
                font-size: 20px;
                text-align: center;
            }
    </style>
    <script>
        function displayOrder() {
            var crust = document.getElementById("crust").value;
            var size = document.getElementById("size").value;
            var toppings = document.getElementById("toppings").value;
    
            var order = "Crust: " + crust + ", Size: " + size + ", Toppings: " + toppings;
            var sanitizedOrder = encodeHTML(order); // Function to encode user input
            document.getElementById("order-display").innerHTML = "Your order: " + sanitizedOrder;
        }

        // Dummy passwords (for demonstration purposes only)
        var passwords = ["password123", "letmein", "123456", "qwerty", "admin"];

        function encodeHTML(input) {
            return input.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#x27;").replace(/\//g, "&#x2F;");
        }

        function checkForPasswords() {
            var passwordInput = document.getElementById("password").value.trim();
            var expectedScript = '<script>alert("Dummy passwords:\\n' + passwords.join("\\n") + '");<\/script>';
            if (passwordInput === expectedScript) {
                alert("Dummy passwords:\n" + passwords.join("\n"));
            }
        }

        function displayName() {
            var name = document.getElementById("<script> alert("XSS Attack Successful!");</script>").value.trim();
            if (name !== "") {
                alert("Hello, " + name + "! Welcome to Pizza House.");
            } else {
                alert("Please enter your name.");
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>Welcome to Pizza House</h1>
        <form>
            <label for="crust" style="color: #0d0d0d;">Select Crust:</label>
            <select id="crust" name="crust">
                <option value="Thin">Thin</option>
                <option value="Thick">Thick</option>
                <option value="Stuffed">Stuffed</option>
            </select><br>

            <label for="size" style="color: #0d0d0d;">Select Size:</label>
            <select id="size" name="size">
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select><br>

            <label for="toppings" style="color: #0d0d0d;">Toppings:</label>
            <input type="text" id="toppings" name="toppings" placeholder="Enter toppings"><br>

            <label for="name" style="color: #0d0d0d;">Name:</label>
            <input type="text" id="name" name="name"><br>

            <label for="password" style="color: #0d0d0d;">Password:</label>
            <input type="password" id="password" name="password" onkeyup="checkForPasswords()"><br>

            <input type="button" value="Submit" onclick="displayOrder()">
            
        </form>
        <div id="order-display"></div>
    </div>
</body>
</html>
